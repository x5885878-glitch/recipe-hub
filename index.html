<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xi++御膳廚 · 統一入口</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="topbar">
  <div class="wrap">
    <a href="index.html" class="brand"><span class="dot"></span>Xi++御膳廚</a>
  </div>
</nav>

<main class="wrap">
  <header class="hero">
    <div class="eyebrow">標準化食譜系統</div>
    <h1>Xi++御膳廚</h1>
    <p>標準化、可複製的家常食譜。點「食譜」看單道菜的完整流程,點「餐期」看某一天的多菜作戰時間軸。</p>
  </header>

  <div class="filterbar" id="filterbar">
    <button class="chip active" data-f="all">全部</button>
    <button class="chip" data-f="recipe">食譜</button>
    <button class="chip" data-f="meal">餐期</button>
  </div>

  <section id="sec-recipe">
    <div class="section-label">食譜</div>
    <div class="grid" id="recipeGrid"></div>
  </section>

  <section id="sec-meal">
    <div class="section-label">餐期</div>
    <div class="grid" id="mealGrid"></div>
  </section>

  <footer class="foot">
    <div>新增食譜 / 餐期後,把項目加進本頁的 <code>CATALOG</code> 即可自動出現在這裡。</div>
  </footer>
</main>

<script>
/* =========================================================================
   目錄清單 — 新增「食譜(單菜)」或「餐期(某天多菜)」就在這裡加一筆
   ========================================================================= */
const CATALOG = {
  // 食譜:for 某一道菜
  recipes: [
    {
      id: "xixi-beef-noodle",
      name: "XiXi流牛肉麵",
      category: "招牌 · 牛肉麵",
      time: "2 天", difficulty: "中",
      tags: ["招牌", "牛肉麵", "隔夜製", "宴客"],
      url: "dishes/xixi-beef-noodle.html"
    },
    {
      id: "gongbao-chicken",
      name: "宮保雞丁",
      category: "川菜 · 熱炒",
      time: "35 min", difficulty: "中",
      tags: ["快炒", "下飯", "微辣"],
      url: "dishes/gongbao-chicken.html"
    },
    {
      id: "tomato-egg-soup",
      name: "番茄蛋花湯",
      category: "家常 · 湯品",
      time: "20 min", difficulty: "易",
      tags: ["湯品", "開胃", "可預煮"],
      url: "dishes/tomato-egg-soup.html"
    }
  ],
  // 餐期:某一天(datecode)的流程,標題附帶當天有哪些菜
  meals: [
    {
      id: "2026-06-28",
      name: "週末雙人晚餐",
      date: "2026-06-28",
      dishes: ["宮保雞丁", "番茄蛋花湯"],
      url: "battle-days/2026-06-28.html"
    }
  ]
};

/* ---------- 渲染 ---------- */
function recipeCard(d){
  return `<a class="card-link" href="${d.url}">
    <div class="dish-card">
      <div class="cat">${d.category}</div>
      <div class="nm">${d.name}</div>
      <div class="meta"><span class="mono">⏱ ${d.time}</span><span>難度 ${d.difficulty}</span></div>
      <div class="ct">${d.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </div></a>`;
}
function mealCard(m){
  return `<a class="card-link" href="${m.url}">
    <div class="battle-card">
      <div class="bd-date">${m.date}</div>
      <div class="bd-name">${m.name}</div>
      <div class="bd-dishes">${m.dishes.join(" · ")}</div>
      <div class="bd-foot">${m.dishes.length} 道菜 · 看時間軸 →</div>
    </div></a>`;
}

document.getElementById("recipeGrid").innerHTML = CATALOG.recipes.map(recipeCard).join("");
document.getElementById("mealGrid").innerHTML   = CATALOG.meals.map(mealCard).join("");

/* ---------- 分類切換:全部 / 食譜 / 餐期 ---------- */
const secRecipe = document.getElementById("sec-recipe");
const secMeal   = document.getElementById("sec-meal");
const fb = document.getElementById("filterbar");
fb.addEventListener("click", e => {
  const btn = e.target.closest(".chip");
  if (!btn) return;
  fb.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  btn.classList.add("active");
  const f = btn.dataset.f;
  secRecipe.style.display = (f === "meal") ? "none" : "";
  secMeal.style.display   = (f === "recipe") ? "none" : "";
});
</script>
</body>
</html>
